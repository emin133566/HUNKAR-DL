<script>
// -----------------------------
// PARTICLE ARKA PLAN
// -----------------------------
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
let particles = [];
for(let i=0;i<150;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    size:Math.random()*2+1,
    speed:Math.random()*1+0.2
  });
}
function drawParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";
  for(let p of particles){
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();
    p.y += p.speed;
    if(p.y>canvas.height){p.y=0; p.x=Math.random()*canvas.width;}
  }
  requestAnimationFrame(drawParticles);
}
drawParticles();

// -----------------------------
// MOUSE TAKİP EDEN NEON IŞIK
// -----------------------------
const neon = document.querySelector('.hero h1');
document.addEventListener('mousemove',e=>{
  const x=e.clientX;
  const y=e.clientY;
  const rect=neon.getBoundingClientRect();
  const centerX=rect.left+rect.width/2;
  const centerY=rect.top+rect.height/2;
  const dx=x-centerX;
  const dy=y-centerY;
  neon.style.boxShadow = `${dx/10}px ${dy/10}px 20px #22c55e, ${-dx/10}px ${-dy/10}px 30px #22c55e`;
  neon.style.textShadow = `${dx/10}px ${dy/10}px 10px #22c55e, ${-dx/10}px ${-dy/10}px 20px #22c55e`;
});

// -----------------------------
// DOWNLOAD BUTTON

}

// DİNAMİK DOWNLOAD KARTLARI EKLEME

for(let i=5;i<=20;i++){
  const card = document.createElement("div");
  card.className="card";
  card.innerHTML = `<img src="https://dummyimage.com/400x250/22c55e/000">
  <h3>Program ${i}</h3>
  <p>Profesyonel araç ${i}.</p>
  <button class="downloadBtn" onclick="download(${i})">Download</button>`;
  grid.appendChild(card);
}
</script>

<script>
    const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting) entry.target.classList.add("visible");
  });
}, {threshold:0.1});

document.querySelectorAll(".card").forEach(card=>{
  observer.observe(card);
});

window.addEventListener("resize", ()=>{

// -----------------------------
// MOUSE IŞIK EKSTRA EFECT
document.addEventListener("mousemove", e=>{
  const dx = e.clientX - window.innerWidth/2;
  const dy = e.clientY - window.innerHeight/2;
  document.querySelectorAll(".card").forEach(card=>{
    card.style.transform=`translate(${dx/80}px, ${dy/80}px)`;
  });
});
document.getElementById("search").addEventListener("input", function(){
  const value = this.value.toLowerCase();
  document.querySelectorAll(".card").forEach(card=>{
    const title = card.querySelector("h3").textContent.toLowerCase();
    if(title.includes(value)){
      card.style.display="block";
    }else{
      card.style.display="none";
    }
  });
});
